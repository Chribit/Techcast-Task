<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Techcast Task Admin</title>
        <link rel="stylesheet" href="./index.css">
    </head>

    <body>
        <div id="interface">
            <div id="push-messages-header">
                <h2 id="push-messages-title">
                    Push Messages
                </h2>

                <a
                    id="client-opener"
                    href="../index.html"
                >
                    <img src="./images/people_icon.svg">
                </a>
            </div>

            <div id="push-messages-wrapper">
                <ul id="push-messages"></ul>
            </div>

            <form id="push-message-creation">
                <input
                    id="push-message-input"
                    type="text"
                    placeholder="Type a push message here..."
                >

                <button id="push-message-confirm">
                    <img src="./images/paper_plane_icon.svg">
                </button>
            </form>
        </div>

        <script defer src="./index.js"></script>
    </body>
</html>
